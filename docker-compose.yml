services:
  app:
    build: .
    # The bot login is interactive (QR code), so keep STDIN/TTY attached.
    stdin_open: true
    tty: true
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Point the agent's conversation memory at the redis service below.
      ZZY_REDIS_ADDR: "redis:6379"
    volumes:
      # Persist credentials, skills, scripts and conversation data.
      - ./data:/app/data
      # Mount your config (copy config.example.toml to config.toml first).
      - ./config.toml:/app/config.toml:ro
    # --- Hardening: contain the agent's shell/script execution ---
    # The image already runs as a non-root user. These options further limit the
    # blast radius if the agent is tricked into running a hostile command.
    # NOTE: the agent legitimately needs outbound network (GitHub Copilot API,
    # WeChat, redis, pip/go fetches), so the network is intentionally NOT cut off.
    security_opt:
      # Prevent gaining new privileges via setuid binaries (e.g. sudo).
      - no-new-privileges:true
    cap_drop:
      # Drop all Linux capabilities; this is a pure outbound client.
      - ALL
    # Cap forks (fork-bomb defense) and resource usage.
    pids_limit: 512
    mem_limit: 1g
    cpus: 2.0
    tmpfs:
      # Writable scratch space that is wiped on restart.
      - /tmp:size=256m,mode=1777
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
