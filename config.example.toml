data_dir = "data"  # base directory for credentials and bot data

[log]
level = "info" # debug, info, warn, error

[copilot]
model = "gpt-4o"

# Conversation memory. Leave addr empty to use in-memory storage (lost on restart).
[redis]
addr = ""          # e.g. "redis:6379" or "localhost:6379"
password = ""
db = 0
ttl_seconds = 0    # 0 = never expire

[agent]
model = ""            # optional; overrides copilot.model for the agent when set
max_iterations = 12   # max reasoning/acting steps per turn
max_history = 40      # max stored messages per session
compact_threshold = 30 # summarize older messages once stored history exceeds this; 0 disables
compact_keep = 12     # most-recent messages kept verbatim when compacting
skills_dir = ""       # optional shared on-disk skills dir; defaults to <data_dir>/agent/skills (builtins are compiled in)
workspace_dir = ""    # defaults to <data_dir>/agent/workspace
auto_approve = []     # tool names that skip the approval prompt, e.g. ["read_file"]
owners = []           # user IDs allowed to run dangerous tools (e.g. run_shell); empty disables the gate

# Dynamic structural memory (off by default). When enabled the agent gets the
# remember/recall/forget tools, and a compact set of memory *indexes* (short
# summaries) is injected into a <system-reminder> before each turn. Full detail
# is stored in the same place as conversation history (Redis when configured,
# otherwise in-process) and is fully isolated per user. Memory is organized into
# four categories: personal, feedback, project, reference. On idle, the agent
# forks the session and reflects on it to distill concise, deduplicated notes.
memory_enabled = false                       # enable structural memory
memory_inject = 6                            # indexes injected per category each turn; 0 => default
memory_soft_cap = 30                         # per-category count that triggers a consolidation/merge pass; 0 => default
reflect_model = ""                           # model for idle reflection; empty => agent model
reflect_idle_seconds = 120                   # quiet period after a turn before reflection runs
reflect_min_messages = 4                     # skip reflection for shorter conversations
embedding_model = "text-embedding-3-small"   # model used to embed/dedup/rank memory; empty => client default

shell_timeout_seconds = 120  # max wall-clock per run_shell command (builds/tests)

# The fetch tool makes HTTP(S) requests (GET/POST/PATCH/DELETE) from trusted host
# code (NOT from inside the sandbox). Hosts listed here (host or any subdomain)
# are pre-trusted for GET and reached without prompting. Any other host — and any
# state-changing method (POST/PATCH/DELETE) on any host — triggers an approval
# prompt; replying "always" remembers that host and method per user (stored in
# the shared store — Redis when configured) so it is not asked again. An empty
# list simply means every host is asked the first time.
network_allowlist = []       # e.g. ["api.github.com", "wttr.in"]

# Sandboxed skills run custom skill code inside the Deno sandbox. By default a
# skill gets read-only access to its own directory and the workspace and no
# network; a skill may opt into workspace writes (write: true) or specific
# network hosts (net: a.com, b.com) in its SKILL.md frontmatter, which then
# require approval. All user-added executable skills must use runtime: deno.
deno_path = ""              # path to the deno binary; empty => look up "deno" on PATH
skill_timeout_seconds = 30  # max wall-clock per sandboxed run_skill execution
skill_memory_mb = 256       # V8 heap cap per sandboxed run_skill execution; 0 => Deno default
